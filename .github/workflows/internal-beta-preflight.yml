name: Internal Beta Preflight

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PROMI_INTERNAL_BETA_MODE: "1"
      NEXT_PUBLIC_PROMI_INTERNAL_BETA_MODE: "1"
      PROMI_INTERNAL_BETA_OWNER_ID: ${{ vars.PROMI_INTERNAL_BETA_OWNER_ID }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
      X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
      X_OAUTH_REDIRECT_URI: ${{ vars.X_OAUTH_REDIRECT_URI }}
      X_REAL_PUBLISHING: ${{ vars.X_REAL_PUBLISHING }}
      X_API_BASE_URL: ${{ vars.X_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Internal beta config validation
        run: npm run check:internal-beta

      - name: Build
        run: npm run build
